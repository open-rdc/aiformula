controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    motor_effort_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

motor_effort_controller:
  ros__parameters:
    joints:
      - motor_spin_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
      motor_spin_joint:
        p: 100.0
        i: 0.0
        d: 10.0
        i_clamp: 0.0
        antiwindup: false
