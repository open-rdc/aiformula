launch: #起動パラメータ
  ros__parameters:
    joy: true
    vectornav : true
    odrive : true
    socketcan : true

/**:  #ワイルドカード(ここのパラメータは全ノードから読める: <名前に注意>)
  ros__parameters:
    # 並進  速度[m/s],加速度[m/s^2],加減速度[-m/s^2],躍度[m/s^3]
    linear_max:
      vel : 4.0
      acc: 5.0
      jer: 0.0
    # 舵角  位置[deg]
    steering_max :
      pos : 10.0

    tread : 0.6
    wheelbase : 0.8

controller_node:
  ros__parameters:
    linear_max_vel : 5.0  #[m/s]

frenet_planner_node:
  ros__parameters:
    # 時間パラメータ
    dt : 0.2               # [s] 軌道の時間離散化間隔
    # 速度パラメータ
    d_t_s : 0.1         # [double] 速度サンプリングの割合
    n_s_sample : 0    # [int] 縦方向サンプリング数
    # 衝突判定
    safety_margin : 0.0  # [m] 障害物からの安全マージン
    # コスト関数の重み
    k_jerk : 1.0          # Jerkペナルティ
    k_time : 1.0          # 時間ペナルティ
    k_d : 1.0             # 目標横位置ペナルティ
    k_d_s : 1.0           # 終端の経路平行（d_s）ペナルティ
    k_s_dot : 1.0         # 目標速度ペナルティ

    k_lat : 1.0           # 横方向
    k_lon : 3.0           # 縦方向

pure_pursuit_node:
  ros__parameters:
    lookahead_distance : 5.0
    curvature_gain : 5.0
    steered_gain : 2.0

chassis_driver_node:
  ros__parameters:
    interval_ms : 2
    wheel_radius : 0.124
    reduction_ratio : 1.0
    reverse_left_flag : false
    reverse_right_flag : false
    caster:
      max_count : 16384
      gear_ratio : 0.59090909090909
      wheel_radius : 0.12 # [m]
      reel_radius : 0.02 # [m]
      steering_radius : 0.032 # [m]
      preload_length : 0.03 # [m]
      preload_gain : 0.1
    drive_pid:
      p_gain : 5.0
      i_gain : 0.0
      d_gain : 0.1

socketcan_interface_node:
  ros__parameters:
    if_name : "can_main"
